<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body class="d-flex flex-column vw-100 vh-100">

    {%- include header.html -%}

    <main class="page-content py-2 flex-shrink-0" aria-label="Content">
      <div class="container">
      {{ content }}
      </div>
    </main>

    <!-- QR Code Modal -->
    <div class="modal fade" id="qrModal" tabindex="-1" aria-labelledby="qrModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="qrModalLabel"></h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-center">
            <canvas id="qrModalCanvas"></canvas>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
      function copyLink(url, btn) {
        navigator.clipboard.writeText(url).then(() => {
          const original = btn.textContent;
          btn.textContent = 'Copied!';
          setTimeout(() => { btn.textContent = original; }, 1500);
        });
      }

      function showQRModal(title, url) {
        const modalLabel = document.getElementById('qrModalLabel');
        const canvas = document.getElementById('qrModalCanvas');
        modalLabel.textContent = title;

        // Clear previous QR code
        canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
        canvas.width = 0;
        canvas.height = 0;

        new QRCode(canvas, {
          text: url,
          width: 256,
          height: 256
        });

        const modal = new bootstrap.Modal(document.getElementById('qrModal'));
        modal.show();
      }

      function copyQRImage(url, btn) {
        const tempDiv = document.createElement('div');
        tempDiv.style.position = 'fixed';
        tempDiv.style.left = '-9999px';
        document.body.appendChild(tempDiv);

        new QRCode(tempDiv, {
          text: url,
          width: 256,
          height: 256
        });

        setTimeout(() => {
          const img = tempDiv.querySelector('img') || tempDiv.querySelector('canvas');
          const canvas = document.createElement('canvas');
          canvas.width = 256;
          canvas.height = 256;
          const ctx = canvas.getContext('2d');

          if (img.tagName === 'IMG') {
            const image = new Image();
            image.onload = () => {
              ctx.drawImage(image, 0, 0);
              canvas.toBlob(blob => {
                navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]).then(() => {
                  const original = btn.textContent;
                  btn.textContent = 'Copied!';
                  setTimeout(() => { btn.textContent = original; }, 1500);
                });
              });
            };
            image.src = img.src;
          } else {
            ctx.drawImage(img, 0, 0);
            canvas.toBlob(blob => {
              navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]).then(() => {
                const original = btn.textContent;
                btn.textContent = 'Copied!';
                setTimeout(() => { btn.textContent = original; }, 1500);
              });
            });
          }

          document.body.removeChild(tempDiv);
        }, 100);
      }
    </script>
  </body>

</html>
